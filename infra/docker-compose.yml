# Run from repo root:
#   docker compose -f infra/docker-compose.yml up --build
#
# Grafana:  http://localhost:3000  (admin / admin)
# Postgres: localhost:5432  (robotics / robotics, db: telemetry)
# MQTT:     localhost:1883

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: crm-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  postgres:
    image: postgres:16
    container_name: crm-postgres
    environment:
      POSTGRES_USER: robotics
      POSTGRES_PASSWORD: robotics
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - crm-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robotics -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: crm-grafana
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - crm-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  simulator:
    build: ../services/simulator
    container_name: crm-simulator
    depends_on:
      - mosquitto
    environment:
      ROBOT_ID: robot-01
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      PUBLISH_HZ: "20"
      FAULT_INTERVAL_S: "60"
      FAULT_DURATION_S: "2"
    restart: unless-stopped

  ingest:
    build: ../services/ingest
    container_name: crm-ingest
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      POSTGRES_URL: postgresql://robotics:robotics@postgres:5432/telemetry
      BATCH_INTERVAL_S: "0.5"
      BATCH_SIZE: "100"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  crm-postgres-data:
  crm-grafana-data:
